<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In — H2O Writes</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--gap-xl) var(--gap-lg);
            background: var(--bg);
        }

        .auth-card {
            width: 100%;
            max-width: 380px;
        }

        .auth-logo {
            font-family: var(--font-brand);
            font-size: 32px;
            letter-spacing: 0.04em;
            color: var(--text);
            text-align: center;
            margin-bottom: var(--gap-xl);
            display: block;
        }

        .auth-logo span { color: var(--accent); }

        .auth-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: var(--gap-xl);
        }

        .auth-title {
            font-family: var(--font-ui);
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: var(--gap-xs);
        }

        .auth-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: var(--gap-xl);
        }

        .auth-error {
            background: rgba(224, 92, 92, 0.1);
            border: 1px solid rgba(224, 92, 92, 0.3);
            border-radius: var(--radius-sm);
            padding: 10px 14px;
            font-size: 13px;
            color: var(--color-danger);
            margin-bottom: var(--gap-md);
            display: none;
        }

        .auth-error.is-visible { display: block; }

        .auth-footer {
            text-align: center;
            margin-top: var(--gap-lg);
            font-size: 13px;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--accent);
            font-weight: 600;
            transition: color var(--transition);
        }

        .auth-footer a:hover { color: var(--accent-hover); }

        .auth-divider {
            height: 1px;
            background: var(--border);
            margin: var(--gap-lg) 0;
        }

        /* Loading state */
        .btn--loading {
            position: relative;
            color: transparent !important;
            pointer-events: none;
        }

        .btn--loading::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(12,15,19,0.3);
            border-top-color: #0C0F13;
            border-radius: 50%;
            animation: spin 600ms linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="auth-page">
    <div class="auth-card">

        <a href="index.html" class="auth-logo brand-text">H2O <span>Writes</span></a>

        <div class="auth-box">
            <div class="auth-title">Welcome back</div>
            <div class="auth-subtitle">Log in to your account to continue.</div>

            <div class="auth-error" id="login-error"></div>

            <div class="form-group">
                <label class="form-label" for="login-email">Email</label>
                <input
                    type="email"
                    id="login-email"
                    class="form-input"
                    placeholder="your@email.com"
                    autocomplete="email"
                    required
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="login-password">Password</label>
                <input
                    type="password"
                    id="login-password"
                    class="form-input"
                    placeholder="••••••••"
                    autocomplete="current-password"
                    required
                >
            </div>

            <button class="btn btn--primary btn--full" id="login-btn" style="margin-top:var(--gap-sm)">
                Log In
            </button>

            <div class="auth-divider"></div>

            <div class="auth-footer">
                Don't have an account? <a href="register.html">Register</a>
            </div>
        </div>

    </div>
</div>

<script src="js/main.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script>
/* ── Login page logic (wired to Supabase in Phase 2A) ── */

const loginBtn = document.getElementById('login-btn');
const emailInput = document.getElementById('login-email');
const passwordInput = document.getElementById('login-password');
const errorEl = document.getElementById('login-error');

function showError(msg) {
    errorEl.textContent = msg;
    errorEl.classList.add('is-visible');
}

function clearError() {
    errorEl.classList.remove('is-visible');
}

async function handleLogin(e) {
    e.preventDefault();
    clearError();

    const email = emailInput.value.trim();
    const password = passwordInput.value;

    if (!email || !password) {
        showError('Please fill in all fields.');
        return;
    }

    loginBtn.classList.add('btn--loading');

    try {
        // Phase 2A: replace this block with Supabase auth
        // const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        // if (error) { showError('Invalid email or password.'); return; }
        // check if banned → showError('Your account has been banned.');
        // check if admin → location.href = 'admin/dashboard.html';
        // else → location.href = 'index.html';

        // Placeholder: simulate delay
        await new Promise(r => setTimeout(r, 800));
        showError('Login requires Supabase setup (Phase 2A).');
    } catch (err) {
        showError('Something went wrong. Please try again.');
    } finally {
        loginBtn.classList.remove('btn--loading');
    }
}

loginBtn.addEventListener('click', handleLogin);
emailInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(e); });
passwordInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(e); });
</script>

</body>
</html>
